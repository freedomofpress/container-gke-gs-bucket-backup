---
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: ["opened", "synchronize"]

permissions:
  contents: read
  actions: read

jobs:
  lint-actions:
    name: Lint:Actions
    uses: freedomofpress/actionslib/.github/workflows/lint-actions.yaml@main

  lint-containerfile:
    name: Lint:Containerfile
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Run hadolint
      uses: hadolint/hadolint-action@v3.3.0
      with:
        dockerfile: ./Containerfile

  lint-python:
    name: Lint:Python
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Configure Poetry
      uses: freedomofpress/actionslib/act/poetry@main
      with:
        python-version: '3.13'
        groups: lint

    - name: Run black
      run: |
        poetry run black .

    - name: Run pylint
      run: |
        poetry run pylint *.py

  test-build:
    name: Test:Build
    uses: freedomofpress/actionslib/.github/workflows/oci-build.yaml@main

  test-python:
    name: Test:Python
    runs-on: ubuntu-latest
    needs:
    - test-build
    steps:
    - name: Install Docker
      uses: docker/setup-docker-action@v5.1.0
      with:
        version: latest

    - name: Download built image
      uses: actions/download-artifact@v8
      with:
        name: ${{ needs.test-build.outputs.artifact-name }}
        path: ${{ runner.temp }}/images

    - name: Restore built image
      env:
        LOAD_FILE: ${{ runner.temp }}/images/${{ needs.test-build.outputs.artifact-image }}
        IMAGE_URL: ${{ needs.test-build.outputs.image-url }}
      run: |
        docker image load --input "$LOAD_FILE"
        docker image tag "$IMAGE_URL" localhost/gke-gs-bucket-backup

    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Run tests in built image
      run: |
        docker container create \
          --name=test-python \
          --interactive \
          --tty \
          --pull=never \
          --entrypoint=/usr/bin/python3 \
          --workdir=/usr/local/bin \
          localhost/gke-gs-bucket-backup \
          -m unittest discover .

        docker container cp \
          ./test_gs_bucket_sync.py \
          test-python:/usr/local/bin/test_gs_bucket_sync.py

        docker container start \
          --attach \
          --interactive \
          test-python
